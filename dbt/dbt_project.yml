name: weather_madiun
version: "1.0.0"
config-version: 2

profile: weather_madiun # harus sama dengan nama di profiles.yml

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: "target" # hasil kompilasi dbt, masuk .gitignore
clean-targets: ["target", "dbt_packages"]

models:
  weather_madiun:
    intermediate:
      +materialized: view
      +schema: silver

    dimensions:
      +materialized: table
      +schema: gold

    facts:
      +materialized: table
      +schema: gold
